name: Deploy public website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "website/**"
      - "PRIVACY*.md"
      - "SUPPORT*.md"
      - "public/icons/icon-128.png"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build the public website
        run: node website/build.mjs && node website/check.mjs

      - name: Upload public website only
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
